<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ETG Dashboard — UI Kit</title>
<link rel="icon" href="assets/etg-mark.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); color: hsl(var(--foreground)); -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: hsl(215 16% 70%); background-clip: content-box; }
  input { outline: none; }
  input:focus { border-color: hsl(var(--ring)) !important; box-shadow: 0 0 0 2px hsl(var(--ring) / 0.25); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="etg-data.jsx"></script>
<script type="text/babel" src="etg-ui.jsx"></script>
<script type="text/babel" src="etg-tz.jsx"></script>
<script type="text/babel" src="etg-shell.jsx"></script>
<script type="text/babel" src="etg-projects.jsx"></script>
<script type="text/babel" src="etg-tickets.jsx"></script>
<script type="text/babel" src="etg-assets.jsx"></script>
<script type="text/babel" src="etg-calendar.jsx"></script>
<script type="text/babel" src="etg-calendar-worker.jsx"></script>
<script type="text/babel" src="etg-timesheets.jsx"></script>
<script type="text/babel" src="etg-reconciliation.jsx"></script>
<script type="text/babel" src="etg-invoice-matching.jsx"></script>
<script type="text/babel" src="etg-create-ticket.jsx"></script>
<script type="text/babel" src="etg-create-project.jsx"></script>
<script type="text/babel" src="etg-app.jsx"></script>
</body>
</html>
